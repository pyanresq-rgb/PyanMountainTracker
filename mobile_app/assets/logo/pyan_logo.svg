  <circle cx="100" cy="100" r="95" fill="#f5f1e8" stroke="#b8d600" stroke-width="2"/>
  
  <!-- Mountains -->
  <path d="M 60 120 L 85 60 L 100 85 L 120 50 L 140 120" fill="#2c3e50" stroke="none"/>
  <path d="M 60 120 L 85 60 L 100 85 L 120 50 L 140 120 L 140 125 L 60 125" fill="#3d5065"/>
  
  <!-- Snow caps -->
  <path d="M 85 60 L 90 75 L 80 75 Z" fill="white"/>
  <path d="M 120 50 L 126 70 L 114 70 Z" fill="white"/>
  
  <!-- Hiker -->
  <circle cx="100" cy="95" r="4" fill="white"/>
  <path d="M 100 99 L 100 110" stroke="white" stroke-width="2" stroke-linecap="round"/>
  <path d="M 100 102 L 93 108" stroke="white" stroke-width="1.5"/>
  <path d="M 100 102 L 107 108" stroke="white" stroke-width="1.5"/>
  <path d="M 100 110 L 95 118" stroke="white" stroke-width="1.5"/>
  <path d="M 100 110 L 105 118" stroke="white" stroke-width="1.5"/>
  <!-- Trekking pole -->
  <path d="M 93 105 L 88 120" stroke="white" stroke-width="1" stroke-linecap="round"/>
  
  <!-- Evergreen trees left -->
  <path d="M 50 110 L 45 115 L 50 120 L 48 120 L 50 125 L 48 125 L 50 128 L 55 128 L 55 110" fill="#1a3d2a"/>
  <path d="M 65 105 L 58 112 L 65 120 L 62 120 L 65 125 L 62 125 L 65 128 L 72 128 L 72 105" fill="#1a3d2a"/>
  
  <!-- Evergreen trees right -->
  <path d="M 150 110 L 155 115 L 150 120 L 152 120 L 150 125 L 152 125 L 150 128 L 145 128 L 145 110" fill="#1a3d2a"/>
  <path d="M 135 105 L 142 112 L 135 120 L 138 120 L 135 125 L 138 125 L 135 128 L 128 128 L 128 105" fill="#1a3d2a"/>
  
  <!-- GPS Pin - Top -->
  <circle cx="100" cy="30" r="6" fill="none" stroke="#60b83d" stroke-width="1.5"/>
  <circle cx="100" cy="30" r="3" fill="#60b83d"/>
  <path d="M 94 35 Q 94 42 100 45 Q 106 42 106 35" fill="#60b83d" opacity="0.3"/>
  
  <!-- Signal waves -->
  <path d="M 88 25 Q 85 28 85 32" stroke="#60b83d" stroke-width="1" fill="none" stroke-linecap="round"/>
  <path d="M 112 25 Q 115 28 115 32" stroke="#60b83d" stroke-width="1" fill="none" stroke-linecap="round"/>
  
  <!-- Compass - Bottom -->
  <circle cx="100" cy="165" r="5" fill="none" stroke="#60b83d" stroke-width="1"/>
  <path d="M 100 162 L 102 165 L 100 168 L 98 165 Z" fill="#60b83d"/>
  
  <!-- Text - PYAN -->
  <text x="100" y="145" font-family="Arial, sans-serif" font-size="18" font-weight="bold" text-anchor="middle" fill="#b8d600">PYAN</text>
  
  <!-- Text - MOUNTAIN TRACKER -->
  <text x="100" y="157" font-family="Arial, sans-serif" font-size="9" text-anchor="middle" fill="white" font-weight="bold">MOUNTAIN</text>
  <text x="100" y="165" font-family="Arial, sans-serif" font-size="9" text-anchor="middle" fill="white" font-weight="bold">TRACKER</text>
  
  <!-- Tagline -->
  <text x="100" y="182" font-family="Arial, sans-serif" font-size="6" text-anchor="middle" fill="#60b83d" letter-spacing="2">TRACK TOGETHER • STAY SAFE</text>
</svg>